<!DOCTYPE HTML>
<html>
<head>
    <title>William Rogero</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="william_rogero_clean.css" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        /* =========================
           SMOOTH SCROLL (PAN EFFECT)
        ========================== */
        html {
            scroll-behavior: smooth;
        }

        /* =========================
           HERO BUTTON STYLE
        ========================== */
        .cta-btn {
            display:inline-block;
            margin-top:25px;
            padding:14px 26px;
            background:#111;
            color:#fff;
            border-radius:8px;
            text-decoration:none;
            transition: all 0.25s ease;
            font-weight: 500;
        }

        /* HOVER = welcoming blue */
        .cta-btn:hover {
            background:#2f80ff;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(47,128,255,0.3);
        }

        /* ACTIVE (click) = warmer blue */
        .cta-btn:active {
            background:#1f5fd1;
            transform: scale(0.98);
        }

        /* =========================
           LINKEDIN BUTTON STYLE
        ========================== */
        .social-link {
            font-size: 1.6rem;
            color: #111;
            transition: all 0.25s ease;
            display:inline-block;
        }

        .social-link:hover {
            color:#2f80ff;
            transform: translateY(-2px);
        }

        .social-link:active {
            color:#1f5fd1;
            transform: scale(0.92);
        }

        /* =========================
           PORTFOLIO GRID (EVEN ROWS)
           FIXED 4-COLUMN LAYOUT
        ========================== */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-top: 30px;
        }

        /* TABLET */
        @media (max-width: 1000px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(1, 1fr);
            }
        }

        .grid a {
            display:block;
            overflow:hidden;
            border-radius: 10px;
        }

        .grid img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display:block;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .grid a:hover img {
            transform: scale(1.04);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .grid a:active img {
            filter: brightness(1.15) drop-shadow(0 0 10px rgba(0,150,255,0.6));
            transform: scale(0.98);
        }

    </style>
</head>

<body>

<div id="wrapper">

    <!-- HERO -->
    <section style="position:relative; height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; overflow:hidden;">

        <!-- Background Video -->
        <video autoplay muted loop playsinline style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:0;">
            <source src="https://cdn.pixabay.com/video/2023/09/23/181995-867576106_large.mp4" type="video/mp4">
        </video>

        <!-- Overlay -->
        <div style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.75); z-index:1;"></div>

        <!-- Content -->
        <div style="position:relative; z-index:2; max-width:800px; padding:20px;">
            <h1 style="font-size:3.5rem;">William Rogero</h1>

            <p style="margin-top:15px;">
                Creative professional with a strong drive to learn, build, and deliver impactful digital and real-world experiences.
            </p>

            <!-- SMOOTH PAN BUTTON -->
            <a href="#portfolio" class="cta-btn">
                VIEW MY PORTFOLIO AND WORK
            </a>
        </div>

    </section>

    <!-- PORTFOLIO -->
    <section id="portfolio" style="padding:60px 20px; text-align:center;">
        <h2>Portfolio</h2>

        <div class="grid">

            <a href="https://willrogero.wordpress.com/wp-content/uploads/2017/04/90-minute-course-method-mcr1.jpg" target="_blank">
                <img src="https://willrogero.wordpress.com/wp-content/uploads/2017/04/90-minute-course-method-mcr1.jpg?w=743&h=366">
            </a>

            <a href="https://willandcreations.wordpress.com/wp-content/uploads/2016/05/1-1-of-11.jpg" target="_blank">
                <img src="https://willandcreations.wordpress.com/wp-content/uploads/2016/05/1-1-of-11.jpg?w=583&h=524">
            </a>

            <a href="https://willandcreations.wordpress.com/wp-content/uploads/2016/05/banner-1.jpg" target="_blank">
                <img src="https://willandcreations.wordpress.com/wp-content/uploads/2016/05/banner-1.jpg?w=613&h=321">
            </a>

            <a href="https://willandcreations.wordpress.com/wp-content/uploads/2016/05/49_new_patient_copy.jpg" target="_blank">
                <img src="https://willandcreations.wordpress.com/wp-content/uploads/2016/05/49_new_patient_copy.jpg?w=481&h=215">
            </a>

            <!-- (rest of your images stay EXACTLY the same — keep pasting them here) -->

        </div>
    </section>

    <!-- FOOTER -->
    <footer style="text-align:center; padding:40px 20px;">
        <div style="margin-bottom:10px;">
            <a href="https://www.linkedin.com/in/williamrogero/" target="_blank" class="social-link">
                <i class="fa-brands fa-linkedin"></i>
            </a>
        </div>

        <p>William Rogero © <span id="year"></span></p>
    </footer>

</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
