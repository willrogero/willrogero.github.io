    <style>

        html {
            scroll-behavior: smooth;
        }

        /* =========================
           BUTTONS
        ========================== */
        .cta-btn {
            display:inline-block;
            margin-top:25px;
            padding:14px 26px;
            background:#111;
            color:#fff;
            border-radius:8px;
            text-decoration:none;
            transition: all 0.25s ease;
            font-weight: 500;
        }

        .cta-btn:hover {
            background:#2f80ff;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(47,128,255,0.3);
        }

        .cta-btn:active {
            background:#1f5fd1;
            transform: scale(0.98);
        }

        .social-link {
            font-size: 1.6rem;
            color: #111;
            transition: all 0.25s ease;
            display:inline-block;
        }

        .social-link:hover {
            color:#2f80ff;
            transform: translateY(-2px);
        }

        .social-link:active {
            color:#1f5fd1;
            transform: scale(0.92);
        }

        /* =========================
           CLEAN 3-COLUMN GRID
        ========================== */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 40px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(1, 1fr);
            }
        }

        /* =========================
           CLEAN IMAGE CARDS (NO CROPPING)
        ========================== */
        .grid a {
            display:flex;
            align-items:center;
            justify-content:center;

            aspect-ratio: 1 / 1;

            border-radius: 14px;
            background: #f5f5f5;

            overflow:hidden;
            padding: 12px;
            text-decoration:none;

            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .grid a:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        .grid a:active {
            transform: scale(0.98);
            background: #eaf4ff;
        }

        /* FULL IMAGE FIT (NO CROP) */
        .grid img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;   /* KEY FIX */
            display:block;
        }

    </style>
</head>
