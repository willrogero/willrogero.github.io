    <style>
        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-top: 30px;
        }

        .grid a {
            display: block;
            text-decoration: none;
        }

        .grid img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            display: block;
        }

        .grid img:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* LIGHT BLUE CLICK EFFECT */
        .grid a:active img {
            filter: brightness(1.2) drop-shadow(0 0 10px rgba(0,150,255,0.7));
            transform: scale(0.98);
        }
    </style>
