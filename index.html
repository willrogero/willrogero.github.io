    <style>

        html {
            scroll-behavior: smooth;
        }

        /* =========================
           CTA BUTTON
        ========================== */
        .cta-btn {
            display:inline-block;
            margin-top:25px;
            padding:14px 26px;
            background:#111;
            color:#fff;
            border-radius:8px;
            text-decoration:none;
            transition: all 0.25s ease;
            font-weight: 500;
        }

        .cta-btn:hover {
            background:#2f80ff;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(47,128,255,0.3);
        }

        .cta-btn:active {
            background:#1f5fd1;
            transform: scale(0.98);
        }

        /* =========================
           LINKEDIN
        ========================== */
        .social-link {
            font-size: 1.6rem;
            color: #111;
            transition: all 0.25s ease;
            display:inline-block;
        }

        .social-link:hover {
            color:#2f80ff;
            transform: translateY(-2px);
        }

        .social-link:active {
            color:#1f5fd1;
            transform: scale(0.92);
        }

        /* =========================
           PORTFOLIO GRID (3 PER ROW)
           CLEAN + CENTERED + SPACED
        ========================== */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px; /* more breathing room */
            margin-top: 40px;
            justify-items: center; /* centers last row items */
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(1, 1fr);
            }
        }

        /* SQUARE TILE */
        .grid a {
            width: 100%;
            aspect-ratio: 1 / 1;   /* PERFECT SQUARE */
            overflow: hidden;
            border-radius: 12px;
            display: block;
            position: relative;
        }

        /* IMAGE CENTER CROPPED (NO WARPING) */
        .grid img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* key fix */
            display:block;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .grid a:hover img {
            transform: scale(1.06);
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        }

        .grid a:active img {
            filter: brightness(1.15) drop-shadow(0 0 10px rgba(0,150,255,0.6));
            transform: scale(0.98);
        }

    </style>
