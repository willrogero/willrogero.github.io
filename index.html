<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Syndicate Society</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Edu+NSW+ACT+Cursive&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      text-align: center;
      background: #ffffff;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(rgba(0,0,0,0.06) 1px, transparent 1px);
      background-size: 12px 12px;
      opacity: 0.35;
      pointer-events: none;
      z-index: -1;
    }

    .hero {
      background-color: #0d1b4c;
      color: white;
      padding: 8rem 1rem 1rem 1rem;
      width: 100%;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform;
      backface-visibility: hidden;
      transform-style: preserve-3d;
    }

    .hero-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.25;
      z-index: 0;
    }

    .hero-logo, #hero-title, #hero-subtitle {
      position: relative;
      z-index: 1;
      will-change: transform, opacity;
      backface-visibility: hidden;
    }

    .hero-logo {
      max-width: 100px;
      margin: 0 auto 0.5rem auto;
      opacity: 0;
      animation: logoFadeIn 2s forwards;
      animation-delay: 0.3s;
    }

    @keyframes logoFadeIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    #hero-title {
      margin: 0;
      font-size: 4rem;
      opacity: 0;
      animation: fadeLoop 5.75s infinite;
    }

    @keyframes fadeLoop {
      0% { opacity: 0; }
      20% { opacity: 1; }
      50% { opacity: 1; }
      65% { opacity: 0; }
      67% { opacity: 0; }
      100% { opacity: 1; }
    }

    #hero-subtitle {
      opacity: 0;
      font-style: italic;
      margin-top: 0.5rem;
      animation: subtitleFade 2s forwards;
      animation-delay: 1s;
    }

    @keyframes subtitleFade {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .container {
      max-width: 1000px;
      width: 90%;
      margin: 0 auto;
      padding: 2rem 0;
      color: black;
    }

    .container img:first-of-type {
      max-width: 80%;
      width: 100%;
      margin-top: 0.5rem;
      margin-bottom: 0.6rem;
      border-radius: 6px;
    }

    iframe {
      aspect-ratio: 16/9;
      max-width: 70%;
      width: 100%;
      margin: 0 auto;
      display: block;
    }

    p {
      line-height: 1.8;
      margin: 1.5rem 0;
    }

    .italic-center {
      font-style: italic;
      margin: 1rem 0;
    }

    .main-cta {
      display: inline-block;
      padding: 1rem 2rem;
      margin: 2rem auto;
      font-size: 1.2rem;
      font-weight: bold;
      color: white;
      background: linear-gradient(90deg, #0d1b4c, #4a90e2);
      border-radius: 8px;
      text-decoration: none;
    }

    .wide-btn {
      display: inline-block;
      padding: 1rem 2.2rem;
      font-size: 1.1rem;
      font-weight: bold;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #0d1b4c, #4a90e2);
      transition: 0.25s;
    }

    .wide-btn:hover {
      background: linear-gradient(90deg, #1a2c66, #5ba3ff);
    }

    .short-btn {
      display: inline-block;
      padding: 1rem 1.4rem;
      font-size: 1.1rem;
      font-weight: bold;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      background: #4a90e2;
      transition: 0.25s;
    }

    .short-btn:hover {
      background: #6ab0ff;
    }

    .bottom-buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 3rem 0;
    }

    /* Footer */
    .footer-text {
      font-size: 0.75rem;
      color: #555;
      margin-bottom: 2rem;
    }

    .poem-container {
      font-family: 'Edu NSW ACT Cursive', cursive;
      font-size: 1.6rem;
      line-height: 1.6;
      margin: 3rem 0;
      text-align: center;
      color: #333;
    }

    .poem-line {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out;
      margin: 1.8rem 0;
    }

    .poem-line.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #play-music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #0d1b4c;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      z-index: 9999;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
    }

    #play-music-btn:hover {
      background: #4a90e2;
    }

    .gif-text-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin: 3rem 0;
      flex-wrap: wrap;
    }

    .gif-text-section .gif-container {
      flex: 0 0 65%;
      max-width: 65%;
    }

    .gif-text-section .gif-container img {
      width: 100%;
      height: auto;
      object-fit: contain;
      flex-shrink: 1;
    }

    .gif-text-section p {
      flex: 1 1 35%;
      max-width: 35%;
      text-align: left;
      font-size: 1rem;
      line-height: 1.6;
      color: #333;
      min-width: 180px;
    }

    @media (max-width: 768px) {
      .gif-text-section {
        flex-direction: column;
        text-align: center;
      }
      .gif-text-section p {
        max-width: 100%;
        flex: none;
      }
      .gif-text-section .gif-container {
        max-width: 100%;
        flex: none;
      }
      .gif-text-section img {
        max-width: 80%;
      }
    }

    .featured-games {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin: 2rem 0 5rem 0;
    }

    .featured-games-heading {
      margin-bottom: 1rem;
      font-size: 1rem;
      color: #0d1b4c;
      width: 80%;
      max-width: 600px;
      text-align: center;
    }

    .featured-game {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0.5rem 0;
      width: 70%;
      max-width: 500px;
    }

    .featured-game img {
      width: 100%;
      height: auto;
      object-fit: contain;
      border-radius: 6px;
    }

    .featured-game p {
      margin: 0;
      font-weight: bold;
      margin-top: 0.5rem;
      font-size: 1rem;
    }

  </style>
</head>
<body>
